[build]
  command = "npm install"
  publish = "public"

# ============================================
# API REDIRECTS to Appwrite Cloud
# ============================================

[[redirects]]
  from = "/api/v1/*"
  to = "https://sgp.cloud.appwrite.io/v1/:splat"
  status = 200

[[redirects]]
  from = "/appwrite/*"
  to = "https://sgp.cloud.appwrite.io/:splat"
  status = 200

# ============================================
# SPA FALLBACK (React Router compatibility)
# ============================================

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ============================================
# ENVIRONMENT VARIABLES (Production)
# ============================================

[context.production.environment]
  APPWRITE_API_ENDPOINT = "https://sgp.cloud.appwrite.io/v1"
  APPWRITE_PROJECT_ID = "69cd732d001088d78edf"
  NODE_ENV = "production"

[context.deploy-preview.environment]
  NODE_ENV = "development"

# ============================================
# HTTP HEADERS (Security & Performance)
# ============================================

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "no-referrer-when-downgrade"
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "application/javascript; charset=UTF-8"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "text/css; charset=UTF-8"
